[compositor]
backend = drm
renderer = gles2
repaint-window = 16
idle-time = 300

[output]
name = Virtual-1
mode = 1280x720
scale = 1.0
transform = normal

[input]
tap-to-click = true
natural-scroll = true
pointer-acceleration = adaptive
keyboard-layout = us

[shell]
panel-position = bottom
panel-height = 48
app-drawer = true
gesture-navigation = true
