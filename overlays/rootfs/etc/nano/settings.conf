[display]
brightness = 80
auto-brightness = false
night-light = false
night-light-temperature = 3500
orientation-lock = false

[sound]
volume = 70
mute = false
notification-sound = true
haptic-feedback = true

[network]
wifi-enabled = true
bluetooth-enabled = false
airplane-mode = false
hostname = nano-os

[system]
timezone = UTC
locale = en_US.UTF-8
24h-clock = true
auto-update = false

[theme]
dark-mode = true
accent-color = #3584e4
font-family = Liberation Sans
font-size = 14
icon-theme = default
