# NanoOS sleep/suspend configuration for mobile

[Sleep]
# Prefer suspend-to-RAM for mobile (fast wake)
SuspendMode=suspend
SuspendState=mem

# Hibernate disabled (mobile rarely has swap)
AllowHibernation=no
AllowSuspendThenHibernate=no

# Suspend-then-hibernate timeout (if enabled)
HibernateDelaySec=3600
