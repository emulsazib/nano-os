# NanoOS logind configuration for mobile
# Single-user, always-on graphical session

[Login]
# Number of virtual terminals
NAutoVTs=1
ReserveVT=1

# Handle lid/power events for mobile
HandlePowerKey=poweroff
HandlePowerKeyLongPress=poweroff
HandleSuspendKey=suspend
HandleHibernateKey=ignore
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=ignore

# Kill user processes on logout (mobile: no stale sessions)
KillUserProcesses=yes

# Session idle tracking
IdleAction=suspend
IdleActionSec=5min

# Auto-suspend after timeout
StopIdleSessionSec=infinity

# Inhibitors
InhibitDelayMaxSec=5

# Runtime directory size
RuntimeDirectorySize=10%
