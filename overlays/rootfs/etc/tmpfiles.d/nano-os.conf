# NanoOS tmpfiles.d configuration
# Creates runtime directories needed by NanoOS services

# XDG_RUNTIME_DIR for root (mobile: single user)
d /run/user/0 0700 root root -

# Wayland socket directory
d /run/user/0/wayland 0700 root root -

# NanoOS runtime state
d /run/nano 0755 root root -
d /run/nano/compositor 0700 root root -
d /run/nano/services 0755 root root -

# PipeWire runtime
d /run/user/0/pipewire 0700 root root -

# Application data directories
d /var/lib/nano 0755 root root -
d /var/lib/nano/settings 0755 root root -
d /var/lib/nano/notes 0755 root root -

# Log directory
d /var/log/nano 0755 root root -

# Cache directory
d /var/cache/nano 0755 root root -

# Temp directory for screenshots, etc.
d /tmp/nano 1777 root root -
